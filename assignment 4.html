<!DOCTYPE html>
<html>
<head>
    <title>Nested List Example</title>
</head>
<body>

    <h2>College Course Structure</h2>

    <ol>
        <li>Engineering
            <ul>
                <li>Computer Science</li>
                <li>Mechanical</li>
                <li>Civil</li>
            </ul>
        </li>

        <li>Science
            <ul>
                <li>Physics</li>
                <li>Chemistry</li>
                <li>Mathematics</li>
            </ul>
        </li>

        <li>Commerce
            <ul>
                <li>Accounting</li>
                <li>Economics</li>
                <li>Business Studies</li>
            </ul>
        </li>
    </ol>

</body>
</html>
