<!DOCTYPE html>
<html>
<head>
    <title>Employee Form</title>
</head>
<body>

<h2>Employee Registration Form</h2>

<form>
    Employee Name: <input type="text"><br><br>
    
    Employee ID: <input type="text"><br><br>
    
    Department:
    <select>
        <option>HR</option>
        <option>IT</option>
        <option>Finance</option>
    </select><br><br>
    
    Salary: <input type="number"><br><br>
    
    Date of Joining: <input type="date"><br><br>
    
    Skills:
    <input type="checkbox"> Java
    <input type="checkbox"> Python
    <input type="checkbox"> HTML<br><br>
    
    <input type="submit" value="Submit">
</form>

</body>
</html>
